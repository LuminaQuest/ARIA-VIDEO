<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>ARIA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  background:#0b0f1a;
  color:white;
  font-family:Arial, sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

button {
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:#5b8dee;
  color:white;
  font-size:16px;
  cursor:pointer;
}

#output {
  margin-top:20px;
  max-width:500px;
  text-align:center;
}
</style>

</head>

<body>

<h2>ARIA Voice Call</h2>

<button onclick="startListening()">🎤 Talk</button>

<div id="output">Start speaking...</div>

<script>
let recognition;
let synth = window.speechSynthesis;
let busy = false;

function startListening() {
  if (!('webkitSpeechRecognition' in window)) {
    alert("Use Chrome browser");
    return;
  }

  recognition = new webkitSpeechRecognition();
  recognition.lang = "en-US";
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onresult = async (event) => {

    // INTERRUPT if ARIA is speaking
    if (synth.speaking) {
      synth.cancel();
      busy = false;
    }

    const text = event.results[0][0].transcript.trim();

    if (!text || busy) return;

    document.getElementById("output").innerText = "You: " + text;

    await sendMessage(text);
  };

  recognition.onerror = (e) => {
    console.log("Speech error:", e);
  };

  recognition.start();
}

async function sendMessage(text) {
  try {
    busy = true;

    const res = await fetch("http://127.0.0.1:5000/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        messages: [{ role: "user", content: text }],
        memory: ""
      })
    });

    const data = await res.json();

    if (data.error) {
      throw new Error(data.error);
    }

    document.getElementById("output").innerText += "\nARIA: " + data.text;

    speak(data.text);

  } catch (err) {
    console.error(err);
    document.getElementById("output").innerText = "Error connecting to backend";
  }

  busy = false;
}

function speak(text) {
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = 1.05;
  utter.pitch = 1.1;

  utter.onend = () => {
    busy = false;
  };

  synth.speak(utter);
}
</script>

</body>
</html>
